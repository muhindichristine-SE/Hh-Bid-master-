body{background:#f0f4f8;font-family:'DM Sans',system-ui,sans-serif}

/* ─── Keyframes ─── */
@keyframes slideInRight{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes shimmer{0%,100%{background-position:200% 0}50%{background-position:-200% 0}}
@keyframes ringPulse{0%{box-shadow:0 0 0 0 rgba(59,130,246,.55)}70%{box-shadow:0 0 0 10px rgba(59,130,246,0)}100%{box-shadow:0 0 0 0 rgba(59,130,246,0)}}
@keyframes walkthroughIn{from{opacity:0;transform:translateY(-8px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes tooltipIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes spotlight{0%,100%{opacity:.85}50%{opacity:1}}
@keyframes checkBounce{0%{transform:scale(0)}60%{transform:scale(1.25)}100%{transform:scale(1)}}
@keyframes barGrow{from{width:0}}
@keyframes badgeFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
@keyframes navSlide{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
@keyframes countUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes statPop{0%{opacity:0;transform:translateY(12px) scale(.95)}100%{opacity:1;transform:translateY(0) scale(1)}}
@keyframes cardReveal{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
@keyframes glowIn{0%{box-shadow:0 0 0 0 rgba(29,78,216,.4)}50%{box-shadow:0 0 16px 4px rgba(29,78,216,.2)}100%{box-shadow:0 0 0 0 rgba(29,78,216,0)}}

/* ─── Page fade ─── */
.fade{animation:slideInRight .32s cubic-bezier(.22,1,.36,1) forwards}

/* ─── Hover cards ─── */
.hovcard{transition:box-shadow .22s,transform .22s,border-color .22s}
.hovcard:hover{box-shadow:0 8px 28px rgba(0,0,0,.12)!important;transform:translateY(-2px)!important}

/* ─── Buttons ─── */
button{cursor:pointer;font-family:inherit;transition:all .17s cubic-bezier(.22,1,.36,1)}
button:not(.flat):hover{transform:translateY(-2px)!important;filter:brightness(1.06)}
button:not(.flat):active{transform:translateY(0)!important}
.navbtn:hover{background:rgba(255,255,255,.11)!important;transform:translateX(3px)!important}
.glow-ring{animation:ringPulse 2s infinite}

/* ─── Scrollbar ─── */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}

/* ─── Inputs ─── */
input,textarea{outline:none;font-family:inherit}
input:focus,textarea:focus{border-color:#1d4ed8!important;box-shadow:0 0 0 3px rgba(29,78,216,.12)!important}

/* ─── Stat stagger ─── */
.stat-animated{animation:statPop .4s cubic-bezier(.22,1,.36,1) both}

/* ─── Doc rows ─── */
.doc-row{animation:cardReveal .3s both}

/* ─── Progress bar ─── */
.progress-bar{animation:barGrow 1.1s cubic-bezier(.22,1,.36,1) both;animation-delay:.25s}

/* ─── Spin / pulse ─── */
.spin{animation:spin .7s linear infinite}
.pulse{animation:pulse 2s ease-in-out infinite}

/* ══════════════════════════════
   WALKTHROUGH SYSTEM
══════════════════════════════ */
.wt-overlay{
  position:fixed;inset:0;z-index:9990;
  background:rgba(15,23,42,.6);
  backdrop-filter:blur(3px);
  animation:overlayIn .3s ease;
}
.wt-spotlight{
  position:fixed;z-index:9995;
  border-radius:14px;
  box-shadow:0 0 0 4000px rgba(15,23,42,.65),0 0 0 3px #3b82f6,0 0 30px rgba(59,130,246,.5);
  transition:all .4s cubic-bezier(.22,1,.36,1);
  pointer-events:none;
  animation:spotlight 2.5s ease-in-out infinite;
}
.wt-card{
  position:fixed;z-index:10000;
  background:#fff;
  border-radius:18px;
  padding:22px 24px 18px;
  width:340px;
  box-shadow:0 24px 64px rgba(0,0,0,.28),0 0 0 1px rgba(59,130,246,.12);
  animation:walkthroughIn .3s cubic-bezier(.22,1,.36,1) forwards;
}
.wt-card-emoji{font-size:22px;margin-bottom:8px}
.wt-card-step{font-size:10px;font-weight:700;color:#94a3b8;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:6px}
.wt-card-title{font-size:15px;font-weight:700;color:#0f172a;margin-bottom:8px;line-height:1.3}
.wt-card-body{font-size:13px;line-height:1.7;color:#475569;margin-bottom:18px}
.wt-card-actions{display:flex;gap:8px;align-items:center}
.wt-btn-next{
  padding:9px 20px;
  background:linear-gradient(135deg,#1d4ed8,#2563eb);
  border:none;border-radius:9px;color:#fff;
  font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;
  box-shadow:0 3px 12px rgba(29,78,216,.35);
  transition:all .17s;
}
.wt-btn-next:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(29,78,216,.45)}
.wt-btn-skip{
  padding:9px 14px;background:transparent;
  border:1px solid #e2e8f0;border-radius:9px;
  color:#94a3b8;font-size:12px;cursor:pointer;font-family:inherit;
  transition:all .15s;
}
.wt-btn-skip:hover{border-color:#94a3b8;color:#64748b}
.wt-progress{display:flex;gap:5px;margin-left:auto;align-items:center}
.wt-dot{width:7px;height:7px;border-radius:50%;background:#e2e8f0;transition:all .25s}
.wt-dot.wt-active{background:#1d4ed8;width:18px;border-radius:4px}
.wt-dot.wt-done{background:#93c5fd}

/* ─── Banner ─── */
.wt-banner{
  background:linear-gradient(135deg,#eff6ff 0%,#dbeafe 100%);
  border:1.5px solid #bfdbfe;
  border-radius:14px;
  padding:15px 18px;
  margin-bottom:22px;
  display:flex;align-items:flex-start;gap:13px;
  animation:slideInUp .32s ease both;
  position:relative;overflow:hidden;
}
.wt-banner::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.45) 50%,transparent 100%);
  background-size:300% 100%;
  animation:shimmer 3.5s ease-in-out infinite;
  pointer-events:none;
}
.wt-banner-icon{
  width:34px;height:34px;border-radius:9px;
  background:linear-gradient(135deg,#1d4ed8,#2563eb);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
  box-shadow:0 3px 10px rgba(29,78,216,.3);
}
.wt-banner-title{font-size:13px;font-weight:700;color:#1e40af;margin-bottom:3px}
.wt-banner-desc{font-size:12px;color:#3b82f6;line-height:1.55}
.wt-banner-close{
  position:absolute;top:10px;right:12px;
  background:none;border:none;color:#93c5fd;
  font-size:17px;cursor:pointer;line-height:1;
  padding:3px 6px;border-radius:5px;font-family:inherit;
  transition:color .15s, background .15s;z-index:1;
}
.wt-banner-close:hover{color:#1d4ed8;background:rgba(29,78,216,.08)}

/* ─── Ripple effect ─── */
.ripple-btn { position: relative; overflow: hidden; }
.ripple-btn::after {
  content: '';
  position: absolute; inset: 0;
  background: rgba(255,255,255,.2);
  border-radius: inherit;
  transform: scale(0);
  opacity: 0;
  transition: transform .4s, opacity .4s;
}
.ripple-btn:active::after { transform: scale(2); opacity: 0; transition: 0s; }

/* ─── Animated gradient badge ─── */
.ai-badge {

/* ─── Hint ring on highlighted elements ─── */

  animation:glowIn 2s ease-in-out infinite;
  z-index:1;
}

function WalkthroughCard({ step, stepIndex, totalSteps, onNext, onSkip, targetRect }) {
  const cardRef = useRef(null);
  const [pos, setPos] = useState({ top:'50%', left:'50%', transform:'translate(-50%,-50%)' });
  useEffect(() => {
    if (!cardRef.current) return;
    const ch = cardRef.current.offsetHeight || 230;
    const cw = 340, vw = window.innerWidth, vh = window.innerHeight, gap = 16;
    if (!targetRect || step.position === 'center') { setPos({ top:'50%', left:'50%', transform:'translate(-50%,-50%)' }); return; }
    let top, left;
    if (step.position === 'below') { top = targetRect.bottom + gap; left = targetRect.left + (targetRect.width - cw) / 2; }
    else if (step.position === 'above') { top = targetRect.top - ch - gap; left = targetRect.left + (targetRect.width - cw) / 2; }
    else { top = targetRect.top + (targetRect.height - ch) / 2; left = targetRect.right + gap; }
    top = Math.max(16, Math.min(top, vh - ch - 16));
    left = Math.max(16, Math.min(left, vw - cw - 16));
    setPos({ top: top + 'px', left: left + 'px', transform:'none' });
  }, [targetRect, step]);
  return React.createElement('div', { ref: cardRef, className:'wt-card', style: pos },
    React.createElement('div', { className:'wt-card-emoji' }, step.emoji),
    React.createElement('div', { className:'wt-card-step' }, `Step ${stepIndex + 1} of ${totalSteps}`),
    React.createElement('div', { className:'wt-card-title' }, step.title),
    React.createElement('div', { className:'wt-card-body', style:{ whiteSpace:'pre-line' } }, step.body),
    React.createElement('div', { className:'wt-card-actions' },
      React.createElement('button', { className:'wt-btn-next', onClick: onNext }, stepIndex === totalSteps - 1 ? 'Finish Tour ✓' : 'Got it →'),
      React.createElement('button', { className:'wt-btn-skip', onClick: onSkip }, 'Skip tour'),
      React.createElement('div', { className:'wt-progress' },
        WT_STEPS.map((_,i) => React.createElement('div', { key:i, className:`wt-dot${i===stepIndex?' wt-active':i<stepIndex?' wt-done':''}` }))
      )
    )
  );
}

function SectionBanner({ section, onDismiss }) {
  const b = SECTION_BANNERS[section];
  if (!b) return null;
  return React.createElement('div', { className:'wt-banner' },
    React.createElement('div', { className:'wt-banner-icon' }, b.icon),
    React.createElement('div', { style:{ flex:1 } },
      React.createElement('div', { className:'wt-banner-title' }, b.title),
      React.createElement('div', { className:'wt-banner-desc' }, b.desc),
    ),
    React.createElement('button', { className:'wt-banner-close', onClick: onDismiss }, '×'),
  );

/* Typewriter text component */
function TypedText({ text, speed = 8 }) {
  const [displayed, setDisplayed] = React.useState('');
  React.useEffect(() => {
    setDisplayed('');
    if (!text) return;
    let i = 0;
    const timer = setInterval(() => {
      setDisplayed(text.slice(0, i));
      i++;
      if (i > text.length) clearInterval(timer);
    }, speed);
    return () => clearInterval(timer);
  }, [text]);
  return React.createElement('span', null, displayed,
    displayed.length < text.length && React.createElement('span', {
      style: { borderRight: '2px solid #1d4ed8', marginLeft: 1, animation: 'pulse 1s step-end infinite' }
    }, '​')
  );
}

/* Animated number that counts up */
function AnimatedNum({ value, suffix = '', duration = 800 }) {
  const [n, setN] = React.useState(0);
  React.useEffect(() => {
    let start = 0, steps = 40;
    const inc = value / steps;
    const t = setInterval(() => {
      start += inc;
      if (start >= value) { setN(value); clearInterval(t); }
      else setN(Math.floor(start));
    }, duration / steps);
    return () => clearInterval(t);
  }, [value]);
  return React.createElement('span', null, n + suffix);
}
